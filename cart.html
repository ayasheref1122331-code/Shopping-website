<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجري المثالي | سلة التسوق</title>
    <link rel="stylesheet" href="../css/1-main.css">
    <link rel="stylesheet" href="../css/2-variables.css">
    <link rel="stylesheet" href="../css/3-responsive.css">
    <link rel="stylesheet" href="../css/4-dark-mode.css">
    <link rel="stylesheet" href="../css/components/5-header.css">
    <link rel="stylesheet" href="../css/components/6-footer.css">
    <link rel="stylesheet" href="../css/components/8-cart.css">
    <link rel="stylesheet" href="../css/components/10-buttons.css">
    <link rel="stylesheet" href="../css/pages/14-cart.css">
</head>
<body>
    <div id="app">
        <header id="main-header"></header>
        <main class="cart-page">
            <div class="cart-container">
                <h1>سلة التسوق</h1>
                <div class="cart-content">
                    <div class="cart-items" id="cartItems"></div>
                    <div class="cart-summary" id="cartSummary"></div>
                </div>
                <div class="cart-actions">
                    <button id="continueShopping">← متابعة التسوق</button>
                    <button id="proceedToCheckout" class="primary">إتمام الشراء →</button>
                </div>
            </div>
        </main>
        <footer id="main-footer"></footer>
    </div>
    <div id="toast-container"></div>
    
    <script src="../js/1-config.js"></script>
    <script src="../js/2-constants.js"></script>
    <script src="../js/3-utils/helpers.js"></script>
    <script src="../js/3-utils/formatters.js"></script>
    <script src="../js/4-services/storage.js"></script>
    <script src="../js/4-services/cart.js"></script>
    <script src="../js/4-services/wishlist.js"></script>
    <script src="../js/5-components/Header.js"></script>
    <script src="../js/5-components/Footer.js"></script>
    <script src="../js/6-pages/cart.js"></script>
</body>
</html>
