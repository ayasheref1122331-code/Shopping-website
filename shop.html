<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجري المثالي | المتجر</title>
    <link rel="stylesheet" href="../css/1-main.css">
    <link rel="stylesheet" href="../css/2-variables.css">
    <link rel="stylesheet" href="../css/3-responsive.css">
    <link rel="stylesheet" href="../css/4-dark-mode.css">
    <link rel="stylesheet" href="../css/components/5-header.css">
    <link rel="stylesheet" href="../css/components/6-footer.css">
    <link rel="stylesheet" href="../css/components/7-product-card.css">
    <link rel="stylesheet" href="../css/components/8-cart.css">
    <link rel="stylesheet" href="../css/components/9-modal.css">
    <link rel="stylesheet" href="../css/components/10-buttons.css">
    <link rel="stylesheet" href="../css/pages/12-shop.css">
</head>
<body>
    <div id="app">
        <header id="main-header"></header>
        <main class="shop-page">
            <div class="shop-container">
                <aside class="shop-sidebar" id="shopSidebar">
                    <div class="filter-group" id="categoryFilter"></div>
                    <div class="filter-group" id="priceFilter"></div>
                    <div class="filter-group" id="brandFilter"></div>
                    <div class="filter-group" id="ratingFilter"></div>
                    <div class="filter-group" id="colorFilter"></div>
                    <div class="filter-group" id="sizeFilter"></div>
                    <button id="clearFilters">مسح الكل</button>
                </aside>
                <div class="shop-content">
                    <div class="shop-header">
                        <div class="results-count" id="resultsCount"></div>
                        <div class="sort-options">
                            <select id="sortSelect">
                                <option value="default">الترتيب الافتراضي</option>
                                <option value="price-asc">السعر: من الأقل للأعلى</option>
                                <option value="price-desc">السعر: من الأعلى للأقل</option>
                                <option value="rating">التقييم</option>
                                <option value="popularity">الأكثر مبيعاً</option>
                                <option value="newest">الأحدث</option>
                            </select>
                            <div class="view-options">
                                <button id="gridView" class="active">📱</button>
                                <button id="listView">📄</button>
                            </div>
                        </div>
                    </div>
                    <div class="products-grid" id="productsGrid"></div>
                    <div class="pagination" id="pagination"></div>
                </div>
            </div>
        </main>
        <footer id="main-footer"></footer>
    </div>
    <div id="cart-sidebar" class="cart-sidebar"></div>
    <div id="product-modal" class="modal"></div>
    <div id="toast-container"></div>
    
    <script src="../js/1-config.js"></script>
    <script src="../js/2-constants.js"></script>
    <script src="../js/3-utils/helpers.js"></script>
    <script src="../js/3-utils/formatters.js"></script>
    <script src="../js/4-services/storage.js"></script>
    <script src="../js/4-services/cart.js"></script>
    <script src="../js/4-services/wishlist.js"></script>
    <script src="../js/5-components/Header.js"></script>
    <script src="../js/5-components/Footer.js"></script>
    <script src="../js/5-components/ProductCard.js"></script>
    <script src="../js/5-components/Pagination.js"></script>
    <script src="../js/6-pages/shop.js"></script>
</body>
</html>
